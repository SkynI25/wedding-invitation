name: Deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # 1. 빌드 및 아티팩트 업로드 Job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # 줄바꿈이 정상적으로 들어가도록 안전한 방식으로 .env 생성
      - name: Setup Environment Variables
        run: |
          echo "VITE_NAVER_MAP_CLIENT_ID=${{ secrets.VITE_NAVER_MAP_CLIENT_ID }}" >> .env
          echo "VITE_KAKAO_SDK_JS_KEY=${{ secrets.VITE_KAKAO_SDK_JS_KEY }}" >> .env
          echo "VITE_SERVER_URL=${{ vars.VITE_SERVER_URL }}" >> .env
          echo "VITE_STATIC_ONLY=${{ vars.VITE_STATIC_ONLY }}" >> .env

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

       Berk- name: Install dependencies
        run: npm install

       Berk- name: Build
        run: npm run build

       Berk- name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./build"

  # 2. 실제 GitHub Pages 배포 Job (빌드가 성공해야만 실행)
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build # build job이 끝나기를 기다립니다.
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
